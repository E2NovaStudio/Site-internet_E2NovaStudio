<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contactez E2 Nova Studio pour un projet de développement web, application IA, montage vidéo ou graphisme."
    />
    <title>Contact | E2 Nova Studio</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <canvas class="nova-canvas" aria-hidden="true"></canvas>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Accueil E2 Nova Studio">
        <img src="assets/logo-e2nova-studio.png" alt="E2 Nova Studio" />
      </a>
      <button class="nav-toggle" type="button" aria-label="Ouvrir le menu" aria-controls="main-nav" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="main-nav" class="main-nav" aria-label="Navigation principale">
        <a href="index.html">Accueil</a>
        <a href="about.html">À propos</a>
        <a href="services.html">Services</a>
        <a class="active" href="contact.html">Contact</a>
        <a href="mentions-legales.html">Mentions légales</a>
      </nav>
    </header>

    <main>
      <section class="page-hero section">
        <p class="eyebrow">Contact</p>
        <h1>Expliquez votre projet</h1>
        <p>Donnez le contexte, l'objectif et le support souhaité.</p>
      </section>

      <section class="section contact-layout">
        <form  id="contact-form"
              class="contact-form"
              action="https://api.web3forms.com/submit"
              method="POST">
        <input
              type="hidden"
              name="access_key"
              value="9f40628a-5f39-41bd-ae69-275390aa14c1">
        <input
            type="hidden"
            name="from_name"
            value="E2 Nova Studio">
        <input
            type="hidden"
            name="subject"
            value="Nouvelle demande depuis le site E2 Nova Studio">
        <input
            type="checkbox"
            name="botcheck"
            class="hidden"
            style="display:none">
          
          <div class="form-row">
            <label for="name">Nom Prénom</label>
            <input id="name" name="name" type="text" autocomplete="name" required />
          </div>
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="form-row">
            <label for="subject">Objet</label>
            <select id="subject" name="service" required>
              <option value="">Sélectionner un objet</option>
              <option value="developpement-web-ia">Développement web & applications IA</option>
              <option value="montage-video">Montage vidéo</option>
              <option value="graphisme">Graphisme</option>
              <option value="autres">Autres</option>
            </select>
          </div>
          <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="7" required></textarea>
         <div class="form-row">
              <label class="checkbox">
                  <input
                      type="checkbox"
                      name="rgpd"
                      required>
          
                  <span>
                      J'accepte que les informations saisies soient utilisées pour être recontacté.
                  </span>
              </label>
        </div>
          <button class="button primary" type="submit">Envoyer la demande</button>
          <p
            id="form-status"
            class="form-status"
            role="status"
            aria-live="polite">
         </p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 E2 Nova Studio. Tous droits réservés.</p>
      <a href="mentions-legales.html">Mentions légales</a>
    </footer>
  </body>
</html>
